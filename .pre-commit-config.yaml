ci:
  autofix_commit_msg: 'chore: auto fixes from pre-commit hooks'

exclude: "tests/integration/files"
repos:

  - repo: https://github.com/google/yamlfmt
    rev: b5ca1890231d5e1e5181fef75a1be609d1e25029 # frozen: v0.21.0
    hooks:
      - id: yamlfmt
        args:
          - "-formatter"
          - "max_line_length=120,retain_line_breaks=true,retain_line_breaks_single=true"
          - "-exclude"
          - ".codacy.yml"

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: 3a8ef795727fa946dfcb21c5d07b1442c2362c09 # frozen: v2.23.0
    hooks:
      - id: pyproject-fmt
        additional_dependencies: [toml-fmt-common<1.3.3]
        args: [--keep-full-version]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 0671d8ab202c4ac093b78433ae5baf74f3fc7246 # frozen: v0.15.15
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # frozen: v2.4.2
    hooks:
      - id: codespell
        args: ["--ignore-words", "doc/styles/config/vocabularies/ANSYS/accept.txt", "-w"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-yaml
      - id: trailing-whitespace

  - repo: https://github.com/ansys/pre-commit-hooks
    rev: ad4e7598809ad98cde5aaf52d80040c7ac56e7cf # frozen: v0.7.2
    hooks:
      - id: add-license-headers
        args:
          - --start_year=2023

  # this validates our github workflow files
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 943377262562a12b57292fc98fabd7dbf81451fe # frozen: 0.37.2
    hooks:
      - id: check-github-workflows

  # this validates our pre-commit.ci configuration
  - repo: https://github.com/pre-commit-ci/pre-commit-ci-config
    rev: 500543de231a91e6157db630075d70320709b834 # frozen: v1.6.1
    hooks:
      - id: check-pre-commit-ci-config
